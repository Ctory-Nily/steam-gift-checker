<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam 跨区送礼差价检测</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="icons/icon48.png" alt="Logo" class="logo">
            <h3>Steam 跨区送礼差价检测</h3>
        </div>
        
        <!-- 检测按钮 -->
        <button id="checkBtn" class="check-button">
            <span>🔍</span> 检测该游戏
        </button>
        
        <!-- 状态显示区域 - 包含检测结果 -->
        <div id="statusArea" class="status-area">
            <div class="status-row">
                <span class="status-label">🌍 当前国家/地区:</span>
                <span id="currentCountryText" class="status-value">加载中...</span>
                <button id="refreshCountryBtn" class="refresh-btn" title="刷新当前国家/地区">🔄</button>
            </div>
            <div class="status-row">
                <span class="status-label">📌 赠送方:</span>
                <span id="senderDisplay" class="status-value">未选择</span>
            </div>
            <div class="status-row">
                <span class="status-label">📥 收礼方:</span>
                <span id="recipientDisplay" class="status-value">未选择</span>
            </div>
            <!-- 检测结果显示区域 -->
            <div id="resultArea" class="result-area" style="display: none;">
                <div class="result-divider"></div>
                <div id="resultContent"></div>
            </div>
        </div>
        
        <!-- 错误提示 -->
        <div id="errorContainer" class="error-container" style="display: none;">
            <div class="error-content">
                <span class="error-icon">💡</span>
                <span id="errorMessage" class="error-message"></span>
                <button id="closeErrorBtn" class="close-error-btn">✕</button>
            </div>
        </div>
        
        <div class="content">
            <div class="country-group">
                <label class="label">
                    <span class="label-icon">📤</span>
                    您的国家/地区 (赠送方):
                </label>
                <div class="search-wrapper">
                    <input type="text" id="senderSearch" class="search-input" placeholder="🔍 搜索国家/地区..." autocomplete="off">
                    <select id="senderCountry" class="country-select" size="1"></select>  <!-- 默认 size=1，只有一行 -->
                </div>
            </div>
            
            <div class="swap-button-wrapper">
                <button id="swapBtn" class="swap-button">⇅ 对调国家/地区</button>
            </div>
            
            <div class="country-group">
                <label class="label">
                    <span class="label-icon">📥</span>
                    收礼方国家/地区:
                </label>
                <div class="search-wrapper">
                    <input type="text" id="recipientSearch" class="search-input" placeholder="🔍 搜索国家/地区..." autocomplete="off">
                    <select id="recipientCountry" class="country-select" size="1"></select>  <!-- 默认 size=1，只有一行 -->
                </div>
            </div>
        </div>
        
        <div class="footer">
            <span class="version">v1.2.4</span>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
